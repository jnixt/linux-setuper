# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################



# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=eDP-1,    1920x1080,  auto-right, 1
monitor=HDMI-A-1, 1920x1080, auto-left,  1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = $terminal -e yazi
$menu = rofi
$taskManager = missioncenter
$editor = zeditor
$browser = firefox


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = swww-daemon || hyprpaper
exec-once = swww img --transition-type simple --transition-duration 0.2 --transition-fps 67 -o eDP-1 ~/.config/wallpapers/silversurfer.gif
exec-once = cliphist wipe
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,67
env = XCURSOR_THEME, UOS-Dark
env = HYPRCURSOR_SIZE,67
env = HYPRCURSOR_THEME, UOS-Dark
env = QT_QPA_PLATFORMTHEME,qt6ct

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 4
    gaps_out = 10

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(ca9ee6ff) rgba(f2d5cfff) 45deg
    col.inactive_border = rgba(b4befe66) rgba(6c708666) 45deg

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 4

    # Change transparency of focused and unfocused windows
    fullscreen_opacity = 1
    active_opacity = 0.86
    inactive_opacity = 0.756

    shadow {
        enabled = true
        range = 3
        render_power = 1
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 3
        new_optimizations = on
        ignore_opacity = on
        xray = false

        vibrancy = 0.4
    }
}


# https://wiki.hypr.land/Configuring/Variables/#animations
#animations {
#    enabled = yes
#
#    # This curve is very steep at the start and very flat at the end
#    # It creates that "heavy physics" feel.
#    bezier = apple_ease, 0.1, 1, 0.1, 1
#
#    # WINDOWS: Pop in slowly and shrink back down when closing
#    # Speed 8-10 is very slow/cinematic.
#    # popin 80% means it starts/ends at 80% scale.
#    animation = windowsIn, 1, 9, apple_ease, popin 0%
#    animation = windowsOut, 1, 10, apple_ease, popin 0%
#    animation = windowsMove, 1, 8, apple_ease, popin 20%
#
#    # WORKSPACES: Smooth, slow sliding movement
#    # Using speed 8 makes the desktop transition feel very deliberate.
#    animation = workspaces, 1, 8, apple_ease, slide
#    animation = workspacesIn, 1, 12, apple_ease, slide
#    animation = workspacesOut, 1, 15, apple_ease, slide
#
#    # FADE: Matches the slow window pop
#    animation = fade, 1, 14, apple_ease
#    animation = layers, 1, 8, apple_ease, fade
# }

animations {
    enabled = true
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = linear, 1, 1, 1, 1
    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 3, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, linear
    animation = borderangle, 1, 30, linear, loop
    animation = fade, 1, 12, default
    animation = workspaces, 1, 8, wind
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
